spring:
  config:
    # dev profile은 학교의 공유 개발 DB를 사용하므로 파일 누락 시 즉시 실패
    import: "file:./.env.dev[.properties]"
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  flyway:
    # 공유 DB Migration은 배포 또는 지정된 담당 절차에서만 실행
    enabled: ${FLYWAY_ENABLED:false}

eureka:
  client:
    # 로컬 인스턴스를 운영 Discovery에 등록하지 않음
    enabled: ${EUREKA_ENABLED:false}
